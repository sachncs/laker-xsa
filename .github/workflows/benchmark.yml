name: Benchmark Regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bench]"

      - name: Run benchmark
        run: |
          python -m laker_xsa.cli.benchmark \
            --d-model 256 \
            --num-heads 4 \
            --num-runs 30 \
            --output benchmark_results.json

      - name: Compare against baseline
        if: github.event_name == 'pull_request'
        run: |
          python -c "
          import json
          import sys

          THRESHOLD_MS = 2.0  # Absolute threshold in ms
          THRESHOLD_PCT = 15.0  # Percentage threshold

          try:
              with open('benchmark_results.json') as f:
                  current = json.load(f)
          except FileNotFoundError:
              print('::warning::No benchmark results found, skipping comparison')
              sys.exit(0)

          print('## Benchmark Results')
          print()
          print('| Seq Len | Attention | Forward (ms) | Backward (ms) |')
          print('|---------|-----------|-------------|---------------|')

          regressions = []

          for seq_len, attn_types in current['results'].items():
              for attn_type, metrics in attn_types.items():
                  fwd = metrics['forward_ms']
                  bwd = metrics['backward_ms']
                  print(f'| {seq_len} | {attn_type} | {fwd:.2f} | {bwd:.2f} |')

                  if fwd > THRESHOLD_MS:
                      regressions.append(
                          f'{attn_type} seq_len={seq_len}: forward {fwd:.2f}ms '
                          f'exceeds {THRESHOLD_MS}ms threshold'
                      )

          print()

          if regressions:
              print('::error::Benchmark regressions detected!')
              print('### Regressions')
              for r in regressions:
                  print(f'- {r}')
              sys.exit(1)
          else:
              print('All benchmarks within acceptable thresholds.')
          "

      - name: Store benchmark results
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark_results.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let results;
            try {
              results = JSON.parse(fs.readFileSync('benchmark_results.json', 'utf8'));
            } catch (e) {
              console.log('No benchmark results file found, skipping comment');
              return;
            }

            let body = '## ⚡ Benchmark Results\n\n';
            body += '| Seq Len | Attention | Forward (ms) | Backward (ms) |\n';
            body += '|---------|-----------|-------------|---------------|\n';

            for (const [seqLen, attnTypes] of Object.entries(results.results)) {
              for (const [attnType, metrics] of Object.entries(attnTypes)) {
                body += `| ${seqLen} | ${attnType} | ${metrics.forward_ms.toFixed(2)} | ${metrics.backward_ms.toFixed(2)} |\n`;
              }
            }

            body += '\n*Benchmark run on CPU with `d_model=256`, `num_heads=4`, `num_runs=30`*\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
